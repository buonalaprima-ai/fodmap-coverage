<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FODMAP — test motore (personalizzato)</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 820px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 1.2rem; }
  .case { padding: 6px 10px; border-radius: 6px; margin: 4px 0; font-size: 0.9rem; }
  .pass { background: #16a34a22; }
  .fail { background: #dc262633; font-weight: 700; }
  .sum { margin-top: 14px; font-weight: 800; font-size: 1.05rem; }
  code { background: #8882; padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
  <h1>Test del motore FODMAP (verdetto personalizzato)</h1>
  <p>Apri questa pagina servita via <code>http(s)</code>. Verifica il motore contro <code>high-fodmap.json</code> + <code>personal-fodmap.json</code>.</p>
  <div id="out">Carico…</div>

<script type="module">
  import { analyze } from "./src/engine.js";
  import { normalizeProduct } from "./src/openfoodfacts.js";

  function tx(t, tags) { const p = { product_name: "X", ingredients_text: t }; if (tags) { p.ingredients_tags = tags; } return { status: 1, product: p }; }
  function notFound() { return { status: 0, product: null }; }
  function noIngr() { return { status: 1, product: { product_name: "X", brands: "Y" } }; }
  // Albero strutturato OFF (path tassonomia). node(id, testo, is_in_taxonomy=1, figli)
  function node(id, text, intax, kids) { const n = { id: id, text: text, is_in_taxonomy: (intax === undefined ? 1 : intax) }; if (kids) { n.ingredients = kids; } return n; }
  function txTree(nodes) { return { status: 1, product: { product_name: "X", ingredients: nodes } }; }

  const CASES = [
    { n: "latte di mandorla → verde", d: tx("Acqua, latte di mandorla, sale"), v: "green" },
    { n: "latte di soia → verde", d: tx("Acqua, latte di soia"), v: "green" },
    { n: "amido di frumento → verde", d: tx("Amido di frumento, acqua"), v: "green" },
    { n: "amaranto → verde", d: tx("Farina di amaranto, sale"), v: "green" },
    { n: "cipollotto → verde", d: tx("Pomodoro, cipollotto"), v: "green" },
    { n: "amido di mais → verde", d: tx("Acqua, amido di mais, zucchero"), v: "green" },
    { n: "lecitina di soia → verde", d: tx("Cacao, zucchero, lecitina di soia"), v: "green" },
    { n: "fosfato → verde (no FOS)", d: tx("Maltodestrine, fosfato di calcio"), v: "green" },
    { n: "pulito (riso/carota/sale) → verde", d: tx("Riso, carota, sale"), v: "green" },

    { n: "mandorle → GIALLO (max 10 pezzi)", d: tx("Mandorle, zucchero"), v: "yellow", dose: "Mandorle" },
    { n: "banana → GIALLO (dose)", d: tx("Banana, zucchero"), v: "yellow", dose: "Banana matura" },
    { n: "fragola → GIALLO (dose)", d: tx("Zucchero, fragola"), v: "yellow", dose: "Fragola" },
    { n: "piselli → GIALLO (audit: 1/3 tazza)", d: tx("Piselli, acqua, sale"), v: "yellow", dose: "Piselli" },

    { n: "kefir → verde (audit)", d: tx("Kefir, fermenti lattici"), v: "green" },
    { n: "latte senza lattosio → verde", d: tx("Latte senza lattosio, fermenti"), v: "green" },
    { n: "ricotta senza lattosio → verde", d: tx("Ricotta senza lattosio, sale"), v: "green" },
    { n: "lattulosio + 'senza lattosio' → ROSSO (non è latticino)", d: tx("Sciroppo, lattulosio, senza lattosio"), v: "red", inc: "Lattulosio" },
    { n: "'può contenere SOIA' (tracce) → verde", d: tx("Amido, aroma. Può contenere SOIA."), v: "green" },
    { n: "soia vera ingrediente → ROSSO", d: tx("Farina di soia, acqua"), v: "red", inc: "Soia (fagioli)" },
    { n: "semi di chia → GIALLO (1 piccola mano)", d: tx("Semi di chia"), v: "yellow", dose: "Semi di chia" },

    { n: "cipolla → ROSSO", d: tx("Pomodoro, cipolla"), v: "red", inc: "Cipolla" },
    { n: "aglio nel testo → ROSSO", d: tx("Tomato, garlic, salt"), v: "red", inc: "Aglio" },
    { n: "tag-categoria ignorato: kale (+en:cabbage) → verde", d: tx("Kale", ["en:kale", "en:cabbage"]), v: "green" },
    { n: "brussels sprouts (+en:cabbage) → GIALLO (Cavoletti, non Cavolo)", d: tx("Brussels sprouts", ["en:brassica", "en:cabbage"]), v: "yellow", dose: "Cavoletti di Bruxelles" },
    { n: "inulina → ROSSO", d: tx("Cioccolato, inulina"), v: "red", inc: "Inulina / fibra di cicoria" },
    { n: "latte intero → ROSSO", d: tx("Latte intero"), v: "red", inc: "Latte vaccino/capra/pecora" },
    { n: "avocado → ROSSO", d: tx("Avocado, sale"), v: "red", inc: "Avocado" },
    { n: "miso → ROSSO (extra)", d: tx("Acqua, miso"), v: "red", inc: "Miso" },
    { n: "glicerolo → ROSSO (extra)", d: tx("Zucchero, glicerolo"), v: "red", inc: "Glicerina (glicerolo)" },
    { n: "kamut → ROSSO (extra)", d: tx("Pasta di kamut"), v: "red", inc: "Kamut" },
    { n: "sciroppo di riso integrale → ROSSO", d: tx("Sciroppo di riso integrale"), v: "red" },
    { n: "sciroppo di riso semplice → verde", d: tx("Sciroppo di riso, sale"), v: "green" },

    { n: "non trovato → unknown", d: notFound(), v: "unknown" },
    { n: "senza ingredienti → unknown", d: noIngr(), v: "unknown" },

    // Falsi positivi emersi dall'audit su 200k prodotti reali:
    { n: "'one or more of the following' (prosa EN) → verde", d: tx("Riso, olio vegetale (contains one or more of the following: canola oil, sunflower oil), sale"), v: "green" },
    { n: "'one and more of the following' → verde", d: tx("Riso, olio (one and more of the following: canola, safflower), sale"), v: "green" },
    { n: "'not more than 2% silicon dioxide' → verde", d: tx("Farina di riso, sale (not more than 2% silicon dioxide)"), v: "green" },
    { n: "beet sugar → verde (è zucchero, non barbabietola)", d: tx("Cacao, beet sugar, acqua"), v: "green" },
    { n: "sugar beet → verde", d: tx("Zucchero (sugar beet), acqua"), v: "green" },
    { n: "barbabietola vera → GIALLO (controllo: non sovra-azzerare)", d: tx("Barbabietola, acqua, sale"), v: "yellow", dose: "Barbabietola" },
    { n: "beet juice (vero beetroot) → GIALLO", d: tx("Water, beet juice, salt"), v: "yellow", dose: "Barbabietola" },

    // Whitelist estratto di malto d'orzo (segnalazione utente) — orzo vero resta rosso:
    { n: "malto: prodotto segnalato (refuso 'matto') → verde", d: tx("Amido di mais, farina di riso, estratto di matto d'orzo senza glutine, sale"), v: "green" },
    { n: "estratto di malto d'orzo (corretto) → verde", d: tx("Riso, estratto di malto d'orzo, sale"), v: "green" },
    { n: "orzo (chicco) → ROSSO (controllo: non whitelistare l'orzo vero)", d: tx("Riso, orzo, sale"), v: "red", inc: "Orzo" },
    { n: "malted barley flour → ROSSO (controllo)", d: tx("Wheat flour, malted barley flour, niacin"), v: "red", inc: "Orzo" },

    // Plurali/varianti aggiunti a high-fodmap.json dopo l'audit 200k (falsi negativi):
    { n: "beets (plurale EN) → GIALLO", d: tx("Beets, water, salt"), v: "yellow", dose: "Barbabietola" },
    { n: "mangoes (plurale EN) → ROSSO", d: tx("Mangoes, water, sugar"), v: "red", inc: "Mango" },
    { n: "champignons (FR) → ROSSO", d: tx("Eau, champignons, sel"), v: "red", inc: "Funghi" },
    { n: "garbanzos (ceci ES) → ROSSO", d: tx("Garbanzos, water, salt"), v: "red", inc: "Ceci" },

    // Formaggi stagionati (~senza lattosio): il latte DEL formaggio non scatta; freschi e latte separato sì.
    { n: "Parmigiano Reggiano (latte) → verde", d: tx("Pomodoro, parmigiano reggiano dop (latte, sale, caglio), basilico"), v: "green" },
    { n: "Parmesan cheese EN (pasteurized milk) → verde", d: tx("Tomato, parmesan cheese (pasteurized milk, salt, enzymes), basil"), v: "green" },
    { n: "Pecorino Romano (latte di pecora) → verde", d: tx("Pasta, pecorino romano (latte di pecora, sale, caglio), pepe"), v: "green" },
    { n: "Mozzarella (fresco) → ROSSO (lattosio)", d: tx("Pomodoro, mozzarella (latte, sale)"), v: "red", inc: "Latte vaccino/capra/pecora" },
    { n: "Pecorino FRESCO → ROSSO (solo 'pecorino romano' whitelistato)", d: tx("Pasta, pecorino fresco (latte di pecora, sale)"), v: "red", inc: "Latte vaccino/capra/pecora" },
    { n: "LASAGNA: parmigiano OK ma besciamella separata → ROSSO", d: tx("Pasta, parmigiano reggiano (latte, sale), spinaci, besciamella (latte, amido di mais)"), v: "red", inc: "Latte vaccino/capra/pecora" },
    { n: "Panna dopo formaggio → ROSSO (panna ≠ latte)", d: tx("Parmigiano reggiano (latte, sale), panna"), v: "red", inc: "Panna" },

    // Oli di semi/frutta a guscio (grassi, low-FODMAP): non scattano; i semi/farine veri sì.
    { n: "olio di semi di girasole → verde (segnalazione patatine)", d: tx("Patate prefritte 96%, olio di semi di girasole 4%"), v: "green" },
    { n: "almond oil → verde", d: tx("Chocolate, almond oil, sugar"), v: "green" },
    { n: "olio di avocado → verde", d: tx("Patate, olio di avocado, sale"), v: "green" },
    { n: "semi di girasole VERI → GIALLO (i semi restano)", d: tx("Pane, semi di girasole, sale"), v: "yellow", dose: "Semi di girasole" },
    { n: "farina di mandorle → GIALLO (resta)", d: tx("Farina di mandorle, uova, zucchero"), v: "yellow", dose: "Mandorle" },

    // PATH TASSONOMIA (albero strutturato OFF, id canonici) — nessuna eccezione per-frase:
    { n: "TAX: en:sunflower-oil → verde (olio ≠ seme)", d: txTree([node("en:potato", "patate"), node("en:sunflower-oil", "olio di semi di girasole")]), v: "green" },
    { n: "TAX: en:garlic → ROSSO", d: txTree([node("en:tomato", "pomodoro"), node("en:garlic", "aglio")]), v: "red", inc: "Aglio" },
    { n: "TAX: Weizenmehl (en:wheat-flour, tedesco) → ROSSO", d: txTree([node("en:wheat-flour", "Weizenmehl")]), v: "red", inc: "Frumento / Grano" },
    { n: "TAX: en:soya-lecithin → verde (≠ soia-fagiolo)", d: txTree([node("en:sugar", "zucchero"), node("en:soya-lecithin", "lecitina di soia")]), v: "green" },
    { n: "TAX: Grana(latte figlio)+mandorle → GIALLO", d: txTree([node("en:grana-padano", "Grana Padano", 1, [node("en:milk", "latte")]), node("en:almond", "mandorle")]), v: "yellow", dose: "Mandorle" },
    { n: "TAX: lasagna parmigiano+besciamella → ROSSO (besciamella resta)", d: txTree([node("en:parmigiano-reggiano", "Parmigiano", 1, [node("en:milk", "latte")]), node("en:bechamel-sauce", "besciamella", 1, [node("en:milk", "latte")])]), v: "red", inc: "Latte vaccino/capra/pecora" },
    { n: "TAX: nodo non riconosciuto (is_in_taxonomy=0) 'aglio' → fallback ROSSO", d: txTree([node("en:rice", "riso"), node("en:blob", "aglio in polvere", 0)]), v: "red", inc: "Aglio" },
    { n: "TAX: tracce 'può contenere latte' → ignorato → verde", d: txTree([node("en:rice", "riso"), node("en:milk", "può contenere tracce di latte", 1)]), v: "green" },
    { n: "TAX: en:milk-fat → verde (grasso, non lattosio)", d: txTree([node("en:sugar", "zucchero"), node("en:milk-fat", "grasso del latte")]), v: "green" },
    { n: "TAX: en:dextrose → verde (glucosio ≠ fruttosio)", d: txTree([node("en:dextrose", "destrosio")]), v: "green" }
  ];

  async function run() {
    const out = document.getElementById("out");
    let db, personal, taxmap;
    try {
      db = await (await fetch("high-fodmap.json")).json();
      personal = await (await fetch("personal-fodmap.json")).json();
      taxmap = await (await fetch("taxonomy-fodmap.json")).json();
    } catch (e) {
      out.textContent = "Impossibile caricare i JSON: " + e.message + " (servi via http, non file://).";
      return;
    }

    let pass = 0, fail = 0;
    const frag = document.createDocumentFragment();
    for (const c of CASES) {
      const res = analyze(normalizeProduct(c.d), db, personal, taxmap);
      const names = res.triggers.map(t => t.nome + "(" + t.stato + (t.dose ? ":" + t.dose : "") + ")");
      let ok = res.verdict === c.v;
      if (ok && c.inc) {
        ok = res.triggers.some(t => t.nome === c.inc);
      }
      if (ok && c.dose) {
        const tg = res.triggers.filter(t => t.nome === c.dose)[0];
        ok = !!(tg && tg.stato === "limite" && tg.dose);
      }
      const div = document.createElement("div");
      div.className = "case " + (ok ? "pass" : "fail");
      div.textContent = (ok ? "✓ " : "✗ ") + c.n + "  →  " + res.verdict + (names.length ? " [" + names.join(", ") + "]" : "");
      frag.appendChild(div);
      if (ok) { pass++; } else { fail++; }
    }
    out.innerHTML = "";
    out.appendChild(frag);
    const sum = document.createElement("div");
    sum.className = "sum";
    sum.textContent = "RISULTATO: " + pass + " pass, " + fail + " fail su " + CASES.length;
    out.appendChild(sum);
  }

  run();
</script>
</body>
</html>
